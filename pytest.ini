[pytest]
asyncio_mode = auto

markers =
    narrative: Narrative scenario tests (full pipeline, may call LLM)
    db: Tests that require a live PostgreSQL database
    phase1: Phase 1 tests (event store, schema)
    phase2: Phase 2 tests (agents, aggregates)
    phase3: Phase 3 tests (projections, daemon)
    phase4: Phase 4 tests (upcasting, versioning)
    phase5: Phase 5 tests (MCP server)
    phase6: Phase 6 tests (what-if projector, regulatory package)
    pg: Tests that require a live PostgreSQL database (alias for db)
